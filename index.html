<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的五彩學習歷程 | My Vibrant Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --primary-pink: #ff9ff3;
            --primary-yellow: #feca57;
            --primary-blue: #48dbfb;
            --primary-green: #1dd1a1;
            --text-dark: #2f3542;
            --text-gray: #57606f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #f0f2f5;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* 🌈 五彩繽紛背景動畫 */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob1 { width: 400px; height: 400px; background: var(--primary-pink); top: -100px; left: -100px; }
        .blob2 { width: 350px; height: 350px; background: var(--primary-blue); bottom: -50px; right: -50px; animation-delay: -5s; }
        .blob3 { width: 300px; height: 300px; background: var(--primary-yellow); top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 100px) rotate(360deg); }
        }

        /* 導覽列 */
        nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        nav a {
            margin: 0 20px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            transition: 0.3s;
            padding: 5px 15px;
            border-radius: 20px;
        }

        nav a:hover {
            background: var(--primary-blue);
            color: white;
        }

        /* 標題區塊 */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            font-family: 'Fredoka One', cursive; /* 圓滾滾的活潑字體 */
            font-size: 4rem;
            color: var(--text-dark);
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px var(--primary-yellow);
        }

        header p {
            font-size: 1.4rem;
            background: linear-gradient(90deg, #ff9ff3, #48dbfb);
            color: white;
            padding: 5px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2.2rem;
            margin: 60px 0 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title i { margin-right: 15px; }

        /* 彩色卡片設計 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 4px solid transparent;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05) rotate(1deg);
            background: #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        /* 不同區塊給予不同邊框色 */
        #comp-grid .card:hover { border-color: var(--primary-pink); }
        #club-grid .card:hover { border-color: var(--primary-blue); }
        #self-grid .card:hover { border-color: var(--primary-green); }

        .card-image {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: white;
        }

        .tag-pink { background: var(--primary-pink); }
        .tag-blue { background: var(--primary-blue); }
        .tag-green { background: var(--primary-green); }

        .card h3 { margin-bottom: 10px; font-size: 1.4rem; }
        .card p { color: var(--text-gray); font-size: 0.95rem; }

        /* 捲動動畫 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: 0.6s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            text-align: center;
            padding: 50px;
            font-weight: bold;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <nav>
        <a href="#comp">🏆 競賽</a>
        <a href="#club">🎸 社團</a>
        <a href="#self">💡 自主學習</a>
    </nav>

    <header>
        <h1>薇閣六年學習歷程</h1>
        <p>繽紛的高中生活實錄 ✨</p>
    </header>

    <div class="container">
        
        <h2 id="comp" class="section-title" style="color: #ef5777;"><i class="fas fa-medal"></i> 競賽成果</h2>
        <div id="comp-grid" class="grid reveal">
            <div class="card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/400x300/ff9ff3/ffffff?text=Competition+Photo" alt="競賽照片">
                </div>
                <span class="tag tag-pink">數理類</span>
                <h3>學科能力競賽</h3>
                <p>挑戰自我極限，在解題過程中發現科學的樂趣。</p>
            </div>
            <div class="card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/400x300/ff9ff3/ffffff?text=Design+Photo" alt="設計照片">
                </div>
                <span class="tag tag-pink">藝術類</span>
                <h3>海報設計大賽</h3>
                <p>將繽紛的色彩轉化為視覺力量，獲得優等獎項。</p>
            </div>
        </div>

        <h2 id="club" class="section-title" style="color: #0fbcf9;"><i class="fas fa-star"></i> 社團活動</h2>
        <div id="club-grid" class="grid reveal">
            <div class="card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/400x300/48dbfb/ffffff?text=Club+Photo" alt="社團照片">
                </div>
                <span class="tag tag-blue">大傳社</span>
                <h3>影像剪輯組長</h3>
                <p>與團員一起熬夜剪片，創作出屬於我們的青春紀錄。</p>
            </div>
        </div>

        <h2 id="self" class="section-title" style="color: #05c46b;"><i class="fas fa-rocket"></i> 自主學習</h2>
        <div id="self-grid" class="grid reveal">
            <div class="card">
                <div class="card-image">
                    <img src="https://via.placeholder.com/400x300/1dd1a1/ffffff?text=Learning+Photo" alt="學習照片">
                </div>
                <span class="tag tag-green">程式設計</span>
                <h3>Web 開發初體驗</h3>
                <p>自主學習 HTML/CSS，從一張白紙到做出現在這個網頁！</p>
            </div>
        </div>

    </div>

    <footer>
        <p>🌈 Keep Growing, Keep Shining | 2026 </p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
